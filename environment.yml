name: tokensmith
channels:
  - conda-forge
  - pytorch
  - defaults

dependencies:
  - python=3.11
  - pip
  - cmake
  - ninja
  - make
  - pkg-config
  - git

  # compiled/scientific stack: keep these out of pip
  - "numpy<2"
  - scipy
  - pandas
  - scikit-learn
  - pytorch
  - torchvision
  - torchaudio

  # normal Python packages available from conda-forge
  - pyyaml
  - tqdm
  - nltk
  - transformers
  - sentence-transformers
  - rank_bm25
  - pytest
  - rich
  - fastapi
  - uvicorn
  - markdown
  - faiss-cpu

  - pip:
      - llama-cpp-python
      - google-genai
      - langchain
      - langchain-text-splitters
      - "pydantic<2.13"
      - docling